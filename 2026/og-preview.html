<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OG Image Preview</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 2rem;
            background: #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .info {
            color: #aaa;
            font-family: sans-serif;
            font-size: 14px;
        }

        .og-frame {
            width: 1200px;
            height: 630px;
            background: #4A3078;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            padding: 60px 60px 60px 120px;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        .left {
            display: flex;
            flex-direction: column;
            gap: 16px;
            flex-shrink: 0;
        }

        .logo-row {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .square-logo {
            width: 96px;
            height: 96px;
        }

        .title {
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 72px;
            color: white;
            white-space: nowrap;
        }

        .subtitle {
            font-family: 'Nunito', sans-serif;
            font-weight: 400;
            font-size: 36px;
            color: rgba(255,255,255,0.85);
            max-width: 480px;
            line-height: 1.4;
        }

        .right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-logo {
            max-width: 580px;
            width: 100%;
            filter: drop-shadow(0 2px 8px rgba(200,200,210,0.5));
        }
    </style>
</head>
<body>
    <div class="info">OG Image Preview — 1200×630px. Screenshot or export this frame.</div>

    <div class="og-frame">
        <div class="left">
            <div class="logo-row">
                <img src="_static/img/logo-white-sq.png" alt="PyOhio" class="square-logo">
                <div class="title">PyOhio 2026</div>
            </div>
            <div class="subtitle">July 25–26, 2026<br>Cleveland, OH</div>
        </div>
        <div class="right">
            <img src="_static/img/pyohio-2026-transparent.png" alt="PyOhio '26" class="hero-logo">
        </div>
    </div>
</body>
</html>
