[site]
title = "PyOhio 2026"
description = "PyOhio 2026 — The Python Community Conference Based in Ohio"
og_image = "https://www.pyohio.org/2026/img/og-image.png"
source = "content"
base_url = "https://www.pyohio.org"
base_path = "/2026"

[theme]
name = "pyohio"
search = true
show_build_info = false

[hooks]
# Emit program/speakers/speakers.csv into the build output for the comms team.
# Runs under plain python3 (stdlib only) so it works in the Netlify build,
# which has no uv. cwd is this 2026/ dir.
post_collect = ["PYTHONPATH=../pyohio-cli/src python3 -m pyohio_cli.csv_export"]
