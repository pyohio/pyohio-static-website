<!DOCTYPE html>
<html lang="en" data-theme="pyohio-light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ page.title }}{% if site.title %} - {{ site.title }}{% endif %}{% endblock %}</title>
    <link rel="icon" href="{{ site.base_path }}/favicon.ico" sizes="48x48">
    <link rel="icon" type="image/png" href="{{ site.base_path }}/favicon.png" sizes="180x180">
    <link rel="apple-touch-icon" href="{{ site.base_path }}/favicon.png">
    {% include "components/meta.html" %}
    <link href="{{ site.base_path }}/{{ site.assets_dir }}/rockgarden.css{% if site.cache_hash %}?v={{ site.cache_hash }}{% endif %}" rel="stylesheet" type="text/css" />
    {% if site.search_enabled %}
    <script src="{{ site.base_path }}/{{ site.assets_dir }}/lunr.min.js{% if site.cache_hash %}?v={{ site.cache_hash }}{% endif %}"></script>
    {% endif %}
    {% for style in site.user_styles %}
    <link rel="stylesheet" href="{{ site.base_path }}/styles/{{ style }}" />
    {% endfor %}
    {% if site.feed_enabled %}
    <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ site.base_url }}{{ site.base_path }}{{ site.feed_path }}">
    {% endif %}
    {% block head %}{% endblock %}
</head>
<body class="min-h-screen bg-primary text-primary-content">
    {% block layout_body %}{% endblock %}
</body>
</html>
