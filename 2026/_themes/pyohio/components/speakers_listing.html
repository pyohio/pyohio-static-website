{% set speakers = page.frontmatter.get('speakers') or [] %}
{% if speakers %}
<div class="not-prose grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-6">
    {% for speaker in speakers %}
    <a href="{{ site.base_path }}/program/speakers/{{ speaker.slug }}/" class="flex flex-col items-center text-center group">
        <img src="{{ speaker.avatar or (site.base_path ~ '/img/speakers/no-profile.png') }}" alt="{{ speaker.name }} profile photo" class="w-32 h-32 rounded-box border-4 border-primary object-cover mb-2" loading="lazy">
        <span class="font-semibold link-secondary group-hover:underline">{{ speaker.name }}</span>
    </a>
    {% endfor %}
</div>
{% else %}
{{ page.html | safe }}
{% endif %}
