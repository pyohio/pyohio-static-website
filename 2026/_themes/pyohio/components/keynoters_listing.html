{% set keynoters = page.frontmatter.get('keynoters') or [] %}
{% if keynoters %}
{% for k in keynoters %}
<section class="mb-12">
    <div class="flex flex-col sm:flex-row gap-6 not-prose mb-4">
        <a href="{{ site.base_path }}/program/speakers/{{ k.slug }}/" class="flex-shrink-0">
            <img src="{{ k.avatar or (site.base_path ~ '/img/speakers/no-profile.png') }}" alt="{{ k.name }} profile photo" class="w-40 h-40 rounded-box border-4 border-primary object-cover" loading="lazy">
        </a>
        <div class="flex-1">
            <h2 class="text-3xl font-extrabold text-primary mb-2">
                <a href="{{ site.base_path }}/program/speakers/{{ k.slug }}/" class="link link-secondary no-underline hover:underline">{{ k.name }}</a>
            </h2>
        </div>
    </div>
    {% if k.biography_html %}
    <div>{{ k.biography_html | safe }}</div>
    {% endif %}
</section>
{% endfor %}
{% else %}
{{ page.html | safe }}
{% endif %}
