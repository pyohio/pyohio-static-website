name: Update Individual Sponsors

on:
  schedule:
    # Daily at ~noon ET. Cron is UTC; ET shifts so this lands at:
    # 1 PM EDT (Mar–Nov) / 12 PM EST (Nov–Mar).
    - cron: "0 17 * * *"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  update-and-pr:
    name: Update Individual Sponsors and PR
    runs-on: ubuntu-latest

    steps:
      - name: Run Timestamp
        run: date

      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pyohio-cli
        run: |
          pip install uv
          uv tool install ./pyohio-cli

      - name: Update individual sponsors data
        env:
          INDIVIDUAL_SPONSORS_SHEET_URL: ${{ secrets.INDIVIDUAL_SPONSORS_SHEET_URL }}
        run: pyohio sponsors update-individual

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v3
        with:
          commit-message: Update individual sponsor data
          title: Update Individual Sponsor Data
          author: PyOhio Automation <noreply@pyohio.org>
          committer: PyOhio Automation <noreply@pyohio.org>
          body: |
            This is an automatic individual sponsor data update from the PSF contributions Google Sheet.
            - Review changes to ensure they are appropriate to publish.
            - If so, merge.
            - If not, update data in the Google Sheet and re-run this workflow.
          labels: |
            automated-pr
            individual-sponsors
          branch: automatic-updates-for-individual-sponsors
          delete-branch: true