name: Update from PreTalx

on:
  schedule:
    # ~9am and 9pm ET (13:00 and 01:00 UTC during EDT).
    - cron: "0 1,13 * * *"

  # Allows manual runs from the Actions tab.
  workflow_dispatch:

jobs:
  update-and-pr:
    name: Update and PR
    runs-on: ubuntu-latest

    steps:
      - name: Run Timestamp
        run: date

      - uses: actions/checkout@v4

      - name: Restore avatar cache
        uses: actions/cache@v4
        with:
          path: pyohio-cli/avatar_cache
          # Unique per-run key so each run saves an updated cache; restore-keys
          # picks up the most recent prior cache.
          key: pretalx-avatar-cache-${{ github.run_id }}
          restore-keys: |
            pretalx-avatar-cache-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pyohio-cli
        run: |
          pip install uv
          uv tool install ./pyohio-cli

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Install Playwright Chromium
        run: |
          # Install the playwright CLI matching pyohio-cli's bundled version
          # so `playwright install` drops the browser into the standard cache
          # used by pyohio-cli's playwright at render time.
          uv tool install playwright
          playwright install chromium --with-deps

      - name: Fetch from PreTalx
        env:
          PRETALX_API_KEY: ${{ secrets.PRETALX_API_KEY }}
        run: pyohio pretalx fetch

      - name: Generate OG images
        run: pyohio og generate

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v3
        with:
          commit-message: Update data and OG images from PreTalx
          title: Update data and OG images from PreTalx
          author: PyOhio Automation <noreply@pyohio.org>
          committer: PyOhio Automation <noreply@pyohio.org>
          body: |
            Automatic update from PreTalx. Includes:

            - Talk + speaker frontmatter under `2026/content/program/`
            - Cached speaker avatars under `2026/_static/img/speakers/`
            - Per-page OpenGraph cards under `2026/_static/img/og/`

            Review changes to ensure they're appropriate to publish, then merge. If something is wrong, fix the source in PreTalx and re-run this workflow.
          labels: |
            automated-pr
          branch: automatic-updates-from-pretalx
          delete-branch: true
