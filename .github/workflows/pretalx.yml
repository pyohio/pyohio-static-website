name: Update from PreTalx

on:
  # Scheduled runs disabled until after the announcement.
  # Uncomment the cron block below to start auto-fetching on a schedule.
  # schedule:
  #   - cron: "30 3,13,22 * * *"

  # Allows manual runs from the Actions tab.
  workflow_dispatch:

jobs:
  update-and-pr:
    name: Update and PR
    runs-on: ubuntu-latest

    steps:
      - name: Run Timestamp
        run: date

      - uses: actions/checkout@v4

      - name: Restore avatar cache
        uses: actions/cache@v4
        with:
          path: pyohio-cli/avatar_cache
          # Unique per-run key so each run saves an updated cache; restore-keys
          # picks up the most recent prior cache.
          key: pretalx-avatar-cache-${{ github.run_id }}
          restore-keys: |
            pretalx-avatar-cache-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pyohio-cli
        run: |
          pip install uv
          uv tool install ./pyohio-cli

      - name: Fetch from PreTalx
        env:
          PRETALX_API_KEY: ${{ secrets.PRETALX_API_KEY }}
        run: pyohio pretalx fetch

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v3
        with:
          commit-message: Update data from PreTalx
          title: Update data from PreTalx
          author: PyOhio Automation <noreply@pyohio.org>
          committer: PyOhio Automation <noreply@pyohio.org>
          body: |
            This is an automatic data update from PreTalx.
            - Review changes to ensure they are appropriate to publish.
            - If so, merge.
            - If not, update data in PreTalx and re-run this workflow.
          labels: |
            automated-pr
          branch: automatic-updates-from-pretalx
          delete-branch: true
